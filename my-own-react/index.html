<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Build Your Own React</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- 브라우저가 JSX 문법을 알아들을 수 있도록 필요한 도구들을 다운로드 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- type="text/babel": 브라우저가 직접 읽지 않고 babel에게 넘김 -->
    <script type="text/babel" src="./src/didact.js"></script>
    <script type="text/babel" src="./src/index.js"></script>
  </body>
</html>
