<!doctype html>
<html>
  <head> </head>
  <body>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      /** @jsx h */

      function h(type, props, ...children) {
        return { type, props, children: children.flat() };
      }

      // const vdom = <div><span></span></div>;
      // console.log(vdom);

      function createElement(node) {
        // text인 경우
        if (typeof node === "string") {
          return document.createTextNode(node);
        }

        // tag인 경우
        const $el = document.createElement(node.type);

        // 각 속성들을 element에 할당해준다.
        Object.entries(node.props || {}).map(([key, value]) =>
          $el.setAttribute(key, value),
        );

        const children = node.children.map(createElement);

        children.forEach((child) => $el.appendChild(child));

        return $el;
      }

      function updateElement(parent, newNode, oldNode, index = 0) {
        // 1. oldNode만 있는 경우
        // newNode가 없는 것이므로 parent에서 oldNode를 삭제한다.
        if (!newNode && oldNode) {
          return parent.removeChild(parent.childNodes[index]);
        }

        // 2. newNode만 있는 경우
        // parent에 newNode를 추가한다.
        if (newNode && !oldNode) {
          return parent.appendChild(createElement(newNode));
        }

        // 3. oldNode와 newNode 모두 text 타입일 경우
        if (typeof newNode === "string" && typeof oldNode === "string") {
          // oldNode의 내용과 newNode의 내용이 다르다면, oldNode의 내용을 newNode의 내용으로 교체한다.
          if (newNode === oldNode) return;
          return parent.replaceChild(
            createElement(newNode),
            parent.childNodes[index],
          );
        }

        // 4. oldNode와 newNode의 태그 이름(type)이 다를 경우
        if (newNode.type !== oldNode.type) {
          return parent.replaceChild(
            createElement(newNode),
            parent.childNodes[index],
          );
        }

        // 5. oldNode와 newNode의 태그 이름(type)이 같을 경우
        // 속성을 업데이트한다.
        updateAttributes(
          parent.childNodes[index],
          newNode.props || {},
          oldNode.props || {},
        );

        // 6. newNode와 oldNode의 모든 자식 태그를 순회하며 1 ~ 5의 내용을 반복한다.
        const maxLength = Math.max(newNode.children.length, oldNode.children.length);

        for (let i = 0; i < maxLength; i++) {
          updateElement(
            parent.childNodes[index],
            newNode.children[i],
            oldNode.children[i],
            i
          )
        }
      }

      function updateAttributes(target, newProps, oldProps) {
        // newProps와 oldProps를 비교해서 다른 부분을 찾는다.

        // newProps에는 없고 oldProps에만 존재하는 속성 -> 삭제
        Object.entries(oldProps).forEach(([key, value]) => {
          if (newProps[key] === undefined) {
            target.removeAttribute(key);
          }
        });

        Object.entries(newProps).forEach(([key, value]) => {
          // newProps와 oldProps 모두에 존재하는 경우
          if (value === oldProps[key]) {
            return;
          }
          target.setAttribute(key, value);
        });
      }

      const oldState = [
        { id: 1, completed: false, content: "todo list item 1" },
        { id: 2, completed: true, content: "todo list item 2" },
      ];

      const newState = [
        { id: 1, completed: true, content: "todo list item 1 update" },
        { id: 2, completed: true, content: "todo list item 2" },
        { id: 3, completed: false, content: "todo list item 3" },
      ];

      const render = (state) => (
        <div id="app">
          <ul>
            {state.map(({ completed, content }) => (
              <li class={completed ? "completed" : null}>
                <input type="checkbox" class="toggle" checked={completed} />
                {content}
                <button class="remove">삭제</button>
              </li>
            ))}
          </ul>
          <form>
            <input type="text" />
            <button type="submit">추가</button>
          </form>
        </div>
      );

      const oldNode = render(oldState);
      const newNode = render(newState);

      const $root = document.createElement("div");

      document.body.appendChild($root);

      // oldNode를 실제 DOM으로 변경하여 업데이트
      updateElement($root, oldNode);

      // 1초 뒤, newNode와 oldNode를 비교하여 변경된 부분만 업데이트
      setTimeout(() => updateElement($root, newNode, oldNode), 1000);
    </script>
  </body>
</html>
