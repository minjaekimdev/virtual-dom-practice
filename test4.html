<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Block vs Flex 높이 상속 차이</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      display: flex;
      justify-content: center;
      gap: 50px;
      background-color: #f0f0f0;
    }

    /* 공통 스타일 */
    h2 { text-align: center; margin-bottom: 10px; }
    p { font-size: 14px; color: #666; margin-bottom: 20px; text-align: center; }

    /* 부모 박스 (검은색 테두리) - 높이 고정 */
    .parent {
      width: 300px;
      height: 400px; /* h-full 이라고 가정 */
      border: 5px solid black;
      background-color: white;
      position: relative;
    }

    /* 자식 박스 (파란색 배경, 빨간 테두리) - 스크롤 생성 시도 */
    .child {
      border: 3px solid red;
      background-color: rgba(0, 0, 255, 0.1);
      overflow-y: auto; /* 스크롤 만들어라! */
    }

    /* ------------------------------------------------ */

    /* 케이스 1: 부모가 Block 일 때 */
    .block-parent {
      display: block;
      /* overflow: hidden; 이 없으면 자식이 튀어나가는걸 보여드리기 위해 제거함 */
    }

    /* 케이스 2: 부모가 Flex 일 때 */
    .flex-parent {
      display: flex;
      /* flex-direction: row (기본값) -> align-items: stretch (기본값) 발동! */
    }
    
    .flex-parent .child {
      width: 100%; /* 가로만 채움 */
      /* 세로(height)는 stretch 덕분에 알아서 100%가 됨 */
    }

    /* 내용물 (그냥 긴 텍스트) */
    .content {
      padding: 10px;
    }
  </style>
</head>
<body>

  <div>
    <h2>CASE 1: Block 부모</h2>
    <p>자식이 부모 높이를 무시하고<br>내용물만큼 길어짐 (스크롤 X)</p>
    
    <div class="parent block-parent">
      <div class="child">
        <div class="content">
          <h3>난 그냥 div야 (Block)</h3>
          <p>내용물이 많으면...</p>
          <script>
            for(let i=0; i<20; i++) document.write(`부모 높이는 모르겠고 그냥 길어질래 (${i})<br>`);
          </script>
        </div>
      </div>
    </div>
    <div style="text-align: center; margin-top: 10px; color: red; font-weight: bold;">
      ▲ 빨간 박스가 검은 박스를 뚫고 나감
    </div>
  </div>

  <div>
    <h2>CASE 2: Flex 부모</h2>
    <p>자식이 부모 높이에 강제로 맞춤<br>(Stretch 효과 -> 스크롤 O)</p>

    <div class="parent flex-parent">
      <div class="child">
        <div class="content">
          <h3>난 Flex Item이야</h3>
          <p>부모님이 Flex라서...</p>
          <script>
            for(let i=0; i<20; i++) document.write(`부모 높이에 딱 맞춰서 갇혔어 (${i})<br>`);
          </script>
        </div>
      </div>
    </div>
    <div style="text-align: center; margin-top: 10px; color: blue; font-weight: bold;">
      ▲ 빨간 박스가 검은 박스 안에 갇힘
    </div>
  </div>

</body>
</html>
